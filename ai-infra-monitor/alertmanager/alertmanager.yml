global:
  resolve_timeout: 5m
  # ── Configure your SMTP here for email alerts ──────────────────────────
  # smtp_smarthost: 'smtp.gmail.com:587'
  # smtp_from: 'alertmanager@yourcompany.com'
  # smtp_auth_username: 'your@gmail.com'
  # smtp_auth_password: 'your-app-password'

# Default routing: all alerts go to the 'default' receiver
route:
  group_by: ['alertname', 'instance']
  group_wait: 30s          # Wait 30s to group alerts before sending
  group_interval: 5m       # Send grouped alerts every 5 minutes
  repeat_interval: 12h     # Re-notify every 12 hours if still firing
  receiver: 'default'

  # Override: critical alerts fire immediately
  routes:
    - match:
        severity: critical
      group_wait: 10s
      repeat_interval: 1h
      receiver: 'critical-alerts'

    - match:
        severity: warning
      receiver: 'warning-alerts'

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://localhost:5001/alert'   # Replace with your webhook
        send_resolved: true

  - name: 'critical-alerts'
    webhook_configs:
      - url: 'http://localhost:5001/alert'
        send_resolved: true
    # ── Uncomment to add email for critical alerts ─────────────────────
    # email_configs:
    #   - to: 'oncall@yourcompany.com'
    #     subject: '[CRITICAL] {{ .GroupLabels.alertname }}'
    #     body: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  - name: 'warning-alerts'
    webhook_configs:
      - url: 'http://localhost:5001/alert'
        send_resolved: true

inhibit_rules:
  # If a node is down, suppress all other alerts from that node
  - source_match:
      alertname: 'NodeDown'
    target_match_re:
      alertname: '.+'
    equal: ['instance']
